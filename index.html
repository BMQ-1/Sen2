<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركة الملفات - النسخة المستقرة</title>
    <!-- استخدام رابط Cloudflare الآمن (لن يتم حظره من برامج الحماية) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        :root {
            --primary-color: #0f766e;
            --hover-color: #115e59;
            --bg-color: #f0fdfa;
            --card-bg: #ffffff;
            --text-color: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 90vh;
        }

        .container {
            width: 100%; max-width: 600px;
            background-color: var(--card-bg);
            padding: 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h1 { text-align: center; color: var(--primary-color); margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #64748b; margin-bottom: 30px; font-size: 0.9em; }

        .section {
            background: #f8fafc; border: 1px solid #e2e8f0;
            padding: 20px; border-radius: 12px; margin-bottom: 20px;
        }

        .id-display {
            font-size: 1.5em; font-weight: bold; text-align: center;
            color: #0369a1; background: #e0f2fe;
            padding: 15px; border-radius: 12px;
            word-break: break-all; cursor: pointer;
            border: 2px dashed #38bdf8;
        }

        input[type="text"], input[type="file"] {
            width: 100%; padding: 14px; margin: 10px 0;
            border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box;
            font-size: 16px; outline: none;
        }
        input[type="text"]:focus { border-color: var(--primary-color); }

        button {
            width: 100%; background-color: var(--primary-color); color: white;
            padding: 14px; border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer; font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover { background-color: var(--hover-color); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }

        .status-bar {
            text-align: center; font-weight: bold; margin-bottom: 20px;
            padding: 12px; border-radius: 8px;
            background-color: #f1f5f9; color: #475569;
        }

        #error-log {
            display: none; background: #fef2f2; color: #dc2626;
            padding: 15px; border-radius: 8px; margin-bottom: 20px;
            border: 1px solid #fca5a5; font-size: 0.9em; text-align: right;
        }

        .file-list { list-style: none; padding: 0; margin: 0; }
        .file-list li {
            background: #fff; border: 1px solid #e2e8f0; margin: 10px 0;
            padding: 15px; border-radius: 8px; display: flex;
            justify-content: space-between; align-items: center;
        }
        a.download-btn {
            background-color: #10b981; color: white; padding: 8px 16px;
            text-decoration: none; border-radius: 6px; font-size: 0.9em; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>نقل الملفات المباشر</h1>
    <p class="subtitle">نسخة آمنة ومتوافقة مع أجهزة الكمبيوتر والهواتف</p>

    <!-- شريط الحالة والأخطاء -->
    <div class="status-bar" id="status">جاري تحميل المكتبات الأساسية...</div>
    <div id="error-log"></div>

    <div class="section">
        <h2>معرف جهازك (اضغط للنسخ)</h2>
        <div class="id-display" id="my-id" onclick="copyId()">...</div>
    </div>

    <div class="section">
        <h2>الاتصال بجهاز آخر</h2>
        <input type="text" id="peer-id-input" placeholder="ألصق معرف الجهاز الآخر هنا...">
        <button onclick="connectToPeer()">إنشاء اتصال</button>
    </div>

    <div class="section" id="send-section" style="opacity: 0.5; pointer-events: none;">
        <h2>إرسال ملف</h2>
        <input type="file" id="file-input">
        <button id="send-btn" onclick="sendFile()">إرسال الملف</button>
    </div>

    <div class="section">
        <h2>الملفات المستلمة</h2>
        <ul class="file-list" id="received-files"></ul>
    </div>
</div>

<script>
    let peer = null;
    let conn = null;

    // التأكد من تحميل الصفحة بالكامل قبل تشغيل الكود
    window.onload = function() {
        // فحص ما إذا كان برنامج الحماية قد حظر مكتبة PeerJS
        if (typeof Peer === 'undefined') {
            showError('برنامج الحماية (Antivirus) أو مانع الإعلانات يمنع تحميل مكتبة الاتصال. يرجى إيقافه مؤقتاً وتحديث الصفحة.');
            updateStatus('فشل التحميل', '#dc2626', '#fef2f2');
            return;
        }
        initApp();
    };

    function initApp() {
        updateStatus('جاري الاتصال بالخادم...', '#0369a1', '#e0f2fe');
        
        // ترك الخادم يولد المعرف تلقائياً لتجنب الحظر
        peer = new Peer({
            debug: 2,
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:global.stun.twilio.com:3478' }
                ]
            }
        });

        peer.on('open', function(id) {
            document.getElementById('my-id').textContent = id;
            updateStatus('متصل وجاهز للاستخدام 🟢', '#15803d', '#dcfce7');
            document.getElementById('error-log').style.display = 'none';
        });

        peer.on('connection', function(connection) {
            conn = connection;
            setupConnection();
        });

        peer.on('error', function(err) {
            let errorMsg = err.type;
            if (err.type === 'server-error') errorMsg = 'الخادم مشغول أو يرفض الاتصال، حاول تحديث الصفحة.';
            if (err.type === 'network') errorMsg = 'لا يوجد اتصال بالإنترنت أو الجدار الناري يمنع الاتصال.';
            
            showError(`نوع الخطأ: ${err.type}<br>التفاصيل: ${errorMsg}`);
            updateStatus('حدث خطأ في الاتصال 🔴', '#dc2626', '#fef2f2');
        });
    }

    function connectToPeer() {
        const peerId = document.getElementById('peer-id-input').value.trim();
        if (!peerId) { alert('الرجاء إدخال معرف الجهاز الآخر.'); return; }
        
        updateStatus('جاري الاتصال بالجهاز الآخر...', '#b45309', '#fef3c7');
        conn = peer.connect(peerId, { reliable: true });
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            updateStatus('تم ربط الجهازين بنجاح! 🟢', '#15803d', '#dcfce7');
            document.getElementById('send-section').style.opacity = '1';
            document.getElementById('send-section').style.pointerEvents = 'auto';
            document.getElementById('peer-id-input').value = '';
        });

        conn.on('data', (data) => {
            if (data.type === 'file') receiveFile(data.file, data.name);
        });

        conn.on('close', () => {
            updateStatus('انقطع الاتصال مع الجهاز الآخر 🔴', '#dc2626', '#fef2f2');
            document.getElementById('send-section').style.opacity = '0.5';
            document.getElementById('send-section').style.pointerEvents = 'none';
        });
    }

    function sendFile() {
        const fileInput = document.getElementById('file-input');
        const sendBtn = document.getElementById('send-btn');
        const file = fileInput.files[0];
        
        if (!file || !conn) { alert('الرجاء اختيار ملف أولاً.'); return; }

        sendBtn.disabled = true;
        sendBtn.textContent = 'جاري الإرسال...';
        updateStatus(`جاري إرسال: ${file.name}...`, '#b45309', '#fef3c7');

        // إرسال الملف مباشرة
        conn.send({
            type: 'file',
            file: file,
            name: file.name
        });

        setTimeout(() => {
            updateStatus('تم إرسال الملف بنجاح! ✅', '#15803d', '#dcfce7');
            fileInput.value = '';
            sendBtn.disabled = false;
            sendBtn.textContent = 'إرسال الملف';
        }, 1000);
    }

    function receiveFile(blob, name) {
        updateStatus('تم استلام ملف جديد! 📥', '#15803d', '#dcfce7');
        
        const url = URL.createObjectURL(blob);
        const list = document.getElementById('received-files');
        const li = document.createElement('li');
        
        const safeName = name.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        
        li.innerHTML = `
            <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%;" title="${safeName}">${safeName}</span> 
            <a href="${url}" download="${safeName}" class="download-btn">حفظ الملف</a>
        `;
        list.appendChild(li);
    }

    function updateStatus(msg, color, bgColor) {
        const statusBar = document.getElementById('status');
        statusBar.textContent = msg;
        statusBar.style.color = color;
        statusBar.style.backgroundColor = bgColor;
    }

    function showError(msg) {
        const errorLog = document.getElementById('error-log');
        errorLog.style.display = 'block';
        errorLog.innerHTML = `<b>تنبيه:</b> ${msg}`;
    }

    function copyId() {
        const idText = document.getElementById('my-id').textContent;
        if(idText && !idText.includes('...')) {
            navigator.clipboard.writeText(idText);
            alert('تم نسخ المعرف بنجاح!');
        }
    }
</script>

</body>
</html>
