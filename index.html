<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انسخ والصق | مشاركة النصوص فورياً</title>
    
    <!-- خطوط جوجل (تاجوال) -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS للتصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- مكتبة PeerJS للاتصال المباشر -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    
    <!-- مكتبة لإنشاء رمز QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- الرأس -->
    <header class="bg-white shadow-sm py-4">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
                انسخ والصق
            </h1>
            <div id="status-badge" class="px-3 py-1 rounded-full text-sm font-medium bg-yellow-100 text-yellow-800 flex items-center gap-2">
                <div class="loader inline-block" id="status-loader"></div>
                <span id="status-text">جاري التهيئة...</span>
            </div>
        </div>
    </header>

    <!-- المحتوى الرئيسي -->
    <main class="flex-grow max-w-6xl mx-auto px-4 py-8 w-full flex flex-col md:flex-row gap-6">
        
        <!-- مساحة النص -->
        <div class="flex-1 flex flex-col bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden relative">
            <div class="bg-gray-100 px-4 py-2 border-b flex justify-between items-center">
                <span class="font-medium text-gray-600">النص المنسوخ</span>
                <button onclick="copyToClipboard()" class="text-sm bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1 rounded transition">نسخ النص</button>
            </div>
            <textarea id="text-input" class="w-full flex-grow p-4 outline-none resize-none text-lg" placeholder="اكتب أو الصق النص هنا... سيظهر فوراً على الجهاز الآخر." disabled></textarea>
        </div>

        <!-- الشريط الجانبي (للاتصال) -->
        <div class="w-full md:w-80 bg-white rounded-xl shadow-md border border-gray-100 p-6 flex flex-col items-center text-center h-fit" id="connection-panel">
            <h3 class="text-lg font-bold mb-2">كيفية الاتصال</h3>
            <p class="text-sm text-gray-500 mb-6" id="instruction-text">امسح رمز QR بهاتفك لربط الجهازين ونقل النصوص فوراً.</p>
            
            <div id="qrcode" class="mb-6 p-2 bg-white border-2 border-gray-100 rounded-lg shadow-sm hidden"></div>
            
            <div class="w-full bg-gray-50 rounded-lg p-3 mb-4 hidden" id="link-container">
                <p class="text-xs text-gray-500 mb-1">رابط الغرفة:</p>
                <input type="text" id="room-link" readonly class="w-full text-sm bg-transparent border-none outline-none text-center text-blue-600 truncate" />
            </div>

            <button id="copy-link-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition hidden">
                نسخ الرابط
            </button>
        </div>
    </main>

    <footer class="text-center py-6 text-gray-400 text-sm">
        تم الإنشاء باستخدام HTML, Tailwind و PeerJS لتتوافق مع GitHub Pages.
    </footer>

    <script>
        const textInput = document.getElementById('text-input');
        const statusBadge = document.getElementById('status-badge');
        const statusText = document.getElementById('status-text');
        const statusLoader = document.getElementById('status-loader');
        const qrContainer = document.getElementById('qrcode');
        const linkContainer = document.getElementById('link-container');
        const roomLinkInput = document.getElementById('room-link');
        const copyLinkBtn = document.getElementById('copy-link-btn');
        const instructionText = document.getElementById('instruction-text');
        const connectionPanel = document.getElementById('connection-panel');

        let peer = null;
        let connection = null;

        // توليد معرف عشوائي فريد للغرفة
        const generateRoomId = () => Math.random().toString(36).substring(2, 8).toLowerCase();
        
        // التحقق مما إذا كان المستخدم يزور رابط غرفة
        const urlParams = new URLSearchParams(window.location.search);
        const joinRoomId = urlParams.get('room');

        function updateStatus(status) {
            statusBadge.className = 'px-3 py-1 rounded-full text-sm font-medium flex items-center gap-2';
            statusLoader.style.display = 'none';

            if (status === 'waiting') {
                statusBadge.classList.add('bg-yellow-100', 'text-yellow-800');
                statusText.innerText = 'في انتظار اتصال الجهاز الآخر...';
                statusLoader.style.display = 'inline-block';
            } else if (status === 'connected') {
                statusBadge.classList.add('bg-green-100', 'text-green-800');
                statusText.innerText = 'متصل بنجاح';
                textInput.disabled = false;
                connectionPanel.classList.add('hidden'); // إخفاء لوحة الاتصال عند النجاح
            } else if (status === 'error') {
                statusBadge.classList.add('bg-red-100', 'text-red-800');
                statusText.innerText = 'خطأ في الاتصال';
            }
        }

        function setupConnectionEvents(conn) {
            connection = conn;
            
            conn.on('open', () => {
                updateStatus('connected');
                
                // استقبال النص
                conn.on('data', (data) => {
                    textInput.value = data;
                });

                // إرسال النص عند الكتابة
                textInput.addEventListener('input', () => {
                    conn.send(textInput.value);
                });
            });

            conn.on('close', () => {
                updateStatus('waiting');
                textInput.disabled = true;
                connectionPanel.classList.remove('hidden');
                if(!joinRoomId) setTimeout(initHost, 1000); // إعادة التهيئة كمضيف
            });
        }

        function initHost() {
            const roomId = "cpme-" + generateRoomId();
            peer = new Peer(roomId);

            peer.on('open', (id) => {
                updateStatus('waiting');
                
                const currentUrl = window.location.href.split('?')[0];
                const joinUrl = `${currentUrl}?room=${id}`;
                
                // عرض الرابط و QR
                qrContainer.classList.remove('hidden');
                linkContainer.classList.remove('hidden');
                copyLinkBtn.classList.remove('hidden');
                
                roomLinkInput.value = joinUrl;
                
                qrContainer.innerHTML = "";
                new QRCode(qrContainer, {
                    text: joinUrl,
                    width: 200,
                    height: 200,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });

                copyLinkBtn.onclick = () => {
                    navigator.clipboard.writeText(joinUrl);
                    copyLinkBtn.innerText = "تم النسخ!";
                    setTimeout(() => copyLinkBtn.innerText = "نسخ الرابط", 2000);
                };
            });

            // عندما يتصل جهاز آخر بنا
            peer.on('connection', (conn) => {
                setupConnectionEvents(conn);
            });

            peer.on('error', (err) => {
                updateStatus('error');
                console.error(err);
            });
        }

        function initClient() {
            peer = new Peer(); // معرف عشوائي للعميل
            
            instructionText.innerText = "جاري الاتصال بالجهاز المضيف...";
            updateStatus('waiting');

            peer.on('open', (id) => {
                const conn = peer.connect(joinRoomId);
                setupConnectionEvents(conn);
            });

            peer.on('error', (err) => {
                updateStatus('error');
                instructionText.innerHTML = "<span class='text-red-500'>فشل الاتصال بالغرفة. تأكد من أن الرابط صحيح وأن الجهاز الآخر مفتوح.</span>";
            });
        }

        // بدء التشغيل
        if (joinRoomId) {
            initClient();
        } else {
            initHost();
        }

        // دالة نسخ محتوى النص
        function copyToClipboard() {
            textInput.select();
            document.execCommand('copy');
            alert('تم نسخ النص إلى الحافظة!');
        }
    </script>
</body>
</html>
