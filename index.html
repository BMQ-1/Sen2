<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركة الملفات - اتصال مستقر</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --hover-color: #1a252f;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container {
            width: 100%; max-width: 600px;
            background-color: var(--card-bg);
            padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        h1 { text-align: center; color: var(--primary-color); margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-size: 0.9em; }

        .section {
            background: #f8f9fa; border: 1px solid #e9ecef;
            padding: 20px; border-radius: 8px; margin-bottom: 20px;
        }

        .id-display {
            font-size: 1.2em; font-weight: bold; text-align: center;
            color: #27ae60; background: #e8f8f5;
            padding: 15px; border-radius: 8px;
            word-break: break-all; cursor: pointer;
            border: 2px dashed #27ae60;
        }

        input[type="text"], input[type="file"] {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #bdc3c7; border-radius: 6px; box-sizing: border-box;
        }

        button {
            width: 100%; background-color: var(--primary-color); color: white;
            padding: 12px; border: none; border-radius: 6px;
            font-size: 16px; cursor: pointer; font-weight: bold;
        }
        button:hover { background-color: var(--hover-color); }

        .status-bar {
            text-align: center; font-weight: bold; margin-bottom: 20px;
            padding: 10px; border-radius: 6px;
            background-color: #e2e8f0; color: #475569;
        }

        .error-log {
            color: #c0392b; font-size: 0.85em; margin-top: 10px;
            background: #fdedec; padding: 10px; border-radius: 4px;
            display: none; text-align: left; direction: ltr;
        }

        .file-list { list-style: none; padding: 0; margin: 0; }
        .file-list li {
            background: #fff; border: 1px solid #e0e0e0; margin: 10px 0;
            padding: 15px; border-radius: 6px; display: flex;
            justify-content: space-between; align-items: center;
        }
        a.download-btn {
            background-color: #27ae60; color: white; padding: 8px 15px;
            text-decoration: none; border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>نقل الملفات (P2P)</h1>
    <p class="subtitle">تم تحسين الاتصال لتجاوز جدار الحماية (Firewall)</p>

    <div class="status-bar" id="status">جاري الاتصال بالخادم...</div>
    <div class="error-log" id="error-log"></div>

    <div class="section">
        <h2>معرف جهازك (اضغط للنسخ)</h2>
        <div class="id-display" id="my-id" onclick="copyId()">جاري التوليد...</div>
    </div>

    <div class="section">
        <h2>الاتصال بجهاز آخر</h2>
        <input type="text" id="peer-id-input" placeholder="ألصق معرف الجهاز الآخر هنا...">
        <button onclick="connectToPeer()">اتصال</button>
    </div>

    <div class="section" id="send-section" style="opacity: 0.5; pointer-events: none;">
        <h2>إرسال ملف</h2>
        <input type="file" id="file-input">
        <button onclick="sendFile()">إرسال</button>
    </div>

    <div class="section">
        <h2>الملفات المستلمة</h2>
        <ul class="file-list" id="received-files"></ul>
    </div>
</div>

<script>
    let peer = null;
    let conn = null;

    function initPeer() {
        // إزالة المعرف المخصص وترك الخادم يولد معرفاً رسمياً لمنع حظر الاتصال
        // إجبار الاتصال عبر المنفذ 443 (HTTPS) لتجاوز جدار الحماية
        peer = new Peer({
            host: '0.peerjs.com',
            port: 443,
            secure: true,
            debug: 3, // تفعيل سجلات الأخطاء التفصيلية
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:global.stun.twilio.com:3478' }
                ]
            }
        });

        peer.on('open', function(id) {
            document.getElementById('my-id').textContent = id;
            updateStatus('متصل وجاهز للاستخدام', '#27ae60', '#e8f8f5');
            document.getElementById('error-log').style.display = 'none';
        });

        peer.on('connection', function(connection) {
            conn = connection;
            setupConnection();
        });

        peer.on('error', function(err) {
            updateStatus('حدث خطأ في الاتصال', '#c0392b', '#fdedec');
            const errorLog = document.getElementById('error-log');
            errorLog.style.display = 'block';
            errorLog.textContent = `Error Type: ${err.type}\nMessage: ${err.message}`;
            console.error(err);
        });
    }

    function connectToPeer() {
        const peerId = document.getElementById('peer-id-input').value.trim();
        if (!peerId) { alert('أدخل المعرف أولاً'); return; }
        updateStatus('جاري الاتصال...');
        conn = peer.connect(peerId, { reliable: true });
        setupConnection();
    }

    function setupConnection() {
        conn.on('open', () => {
            updateStatus('تم الاتصال بنجاح!', '#2980b9', '#ebf5fb');
            document.getElementById('send-section').style.opacity = '1';
            document.getElementById('send-section').style.pointerEvents = 'auto';
            document.getElementById('peer-id-input').value = '';
        });

        conn.on('data', (data) => {
            if (data.type === 'file') receiveFile(data.file, data.name);
        });

        conn.on('close', () => {
            updateStatus('انقطع الاتصال', '#c0392b', '#fdedec');
            document.getElementById('send-section').style.opacity = '0.5';
            document.getElementById('send-section').style.pointerEvents = 'none';
        });
    }

    function sendFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file || !conn) return;

        updateStatus(`جاري إرسال ${file.name}...`);
        conn.send({ type: 'file', file: file, name: file.name });
        updateStatus('تم الإرسال بنجاح!', '#27ae60', '#e8f8f5');
        fileInput.value = ''; 
    }

    function receiveFile(blob, name) {
        updateStatus('تم استلام ملف جديد', '#27ae60', '#e8f8f5');
        const url = URL.createObjectURL(blob);
        const list = document.getElementById('received-files');
        const li = document.createElement('li');
        li.innerHTML = `<span>${name}</span> <a href="${url}" download="${name}" class="download-btn">تحميل</a>`;
        list.appendChild(li);
    }

    function updateStatus(msg, color = '#475569', bgColor = '#e2e8f0') {
        const statusBar = document.getElementById('status');
        statusBar.textContent = msg;
        statusBar.style.color = color;
        statusBar.style.backgroundColor = bgColor;
    }

    function copyId() {
        const idText = document.getElementById('my-id').textContent;
        if(idText && !idText.includes('جاري')) {
            navigator.clipboard.writeText(idText);
            alert('تم نسخ المعرف!');
        }
    }

    window.onload = initPeer;
</script>

</body>
</html>
